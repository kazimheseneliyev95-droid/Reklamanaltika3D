services:
  - type: web
    name: whatsapp-crm
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_WEBHOOK_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: ALLOW_LEGACY_MASTER_PASSWORD
        value: "true"
      - key: ALLOW_LEGACY_TOKEN
        value: "true"
